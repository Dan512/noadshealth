<header class="site-header">
  <div class="container header-inner">
    <a href="{{ "/" | relURL }}" class="site-title" rel="home">
      <span class="site-title-no">no</span><span class="site-title-ads">ads</span><span class="site-title-suffix">health</span>
    </a>
    {{- $current := .RelPermalink -}}
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ "/articles/" | relURL }}"{{ if hasPrefix $current "/articles/" }} aria-current="page"{{ end }}>Articles</a>
      <a href="{{ "/calculators/" | relURL }}"{{ if hasPrefix $current "/calculators/" }} aria-current="page"{{ end }}>Calculators</a>
      <a href="{{ "/about/" | relURL }}"{{ if eq $current "/about/" }} aria-current="page"{{ end }}>About</a>
    </nav>
  </div>
</header>
